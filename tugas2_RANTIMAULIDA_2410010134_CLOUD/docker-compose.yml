services:
  web:
    build: .
    container_name: php_apache_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: my_first_db
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "33066:3306"

  pma:
    image: phpmyadmin:latest
    container_name: phpmyadmin_ui
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  db_data: